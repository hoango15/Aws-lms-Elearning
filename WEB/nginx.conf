server {
    listen 80;
    server_name localhost;

    # CẤU HÌNH BẢO MẬT: Cho phép trình duyệt nhúng Iframe Video từ YouTube
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; frame-src 'self' https://www.youtube.com https://youtube.com; img-src 'self' data: /uploads/;" always;

    # Proxy API requests to NodeJS Backend
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10M;
    }

    # BẮT NGINX ĐỌC ẢNH TRỰC TIẾP (Thay vì proxy qua Backend để tránh lỗi 404)
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 7d;
        client_max_body_size 10M;
    }

    # Proxy frontend requests to React Frontend Container
    location / {
        proxy_pass http://frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}